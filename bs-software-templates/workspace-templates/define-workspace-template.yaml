apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: define-workspace-template
  title: Define Workspace Template
  description: Workflow to generate terraform to setup infra required for Developement Worksapce.
spec:
  owner: user:guest
  type: service

  # These parameters are used to generate the input form in the frontend, and are
  # used to gather input data for the execution of the template.
  parameters:
    - title: Workspace Template Configuration
      required:
        - templateName
      properties:
        templateName:
          title: Template Name
          type: string
          description: Provide a unique template name
          ui:autofocus: true
          ui:options:
            rows: 5
    - title: Image Repo Info
      required:
        - imageRegistry
        - imageRepo
        - imageName
        - imageTag
        - repoUser
        - repoPass
      properties:
        imageRegistry:
          title: Image Registry
          type: string
          description: Provide image registry (e.g., ghcr.io)
          ui:autofocus: true
          ui:options:
            rows: 5
        imageRepo:
          title: Image Repository
          type: string
          description: Provide image repository name
          ui:autofocus: true
          ui:options:
            rows: 5
        imageName:
          title: Image Name
          type: string
          description: Provide image name
          ui:autofocus: true
          ui:options:
            rows: 5
        imageTag:
          title: Image Tag
          type: string
          description: Provide image tag
          ui:autofocus: true
          ui:options:
            rows: 5
        repoUser:
          title: User Id for Image Registry
          type: string
          description: Provide username for image registry
          ui:autofocus: true
          ui:options:
            rows: 5
        repoPass:
          title: Password for Image Registry
          type: string
          description: Provide password for image registry
          ui:field: password
          ui:autofocus: true
    - title: Configure Dockerfile
      required:
        - dockerfile
        - extensions
      oneOf:
        - title: Python
          properties:
            dockerfileType:
              const: python
            dockerfile:
              type: string
              title: Dockerfile
              ui:widget: textarea
              ui:options:
                rows: 22
              default: |
                FROM ubuntu:latest

                ENV DEBIAN_FRONTEND=noninteractive

                RUN apt-get update && apt-get install -y \
                    curl \
                    wget \
                    git \
                    python3 \
                    python3-pip \
                    sudo \
                    ca-certificates \
                    gnupg \
                    && rm -rf /var/lib/apt/lists/*

                RUN curl -fsSL https://code-server.dev/install.sh | sh

                COPY install-vscode-extensions.sh /usr/local/bin/install-vscode-extensions.sh
                RUN chmod +x /usr/local/bin/install-vscode-extensions.sh

                COPY extensions.txt /tmp/extensions.txt

                RUN useradd -m wcd && \
                echo "wcd ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers

                USER wcd
                WORKDIR /home/wcd
        - title: Yocto
          properties:
            dockerfileType:
              const: yocto
            dockerfile:
              type: string
              title: Dockerfile
              ui:widget: textarea
              ui:options:
                rows: 22
              default: |
                # Automotive Yocto build container (Ubuntu-based)
                # - Suitable for poky + meta-openembedded + meta-ivi/meta-agl/meta-automotive
                # - Non-root user for builds
                # - Supports external DL_DIR and SSTATE_DIR via volume mounts

                FROM ubuntu:22.04

                ARG DEBIAN_FRONTEND=noninteractive
                ARG USERNAME=builder
                ARG USER_UID=1000
                ARG USER_GID=1000

                # --- Base packages & Yocto deps ---
                RUN apt-get update && apt-get install -y --no-install-recommends \
                    bash bc bison build-essential ca-certificates chrpath \
                    cpio curl diffstat file gawk gcc git iputils-ping \
                    less libegl1-mesa liblz4-tool locales \
                    lsb-release make mesa-common-dev nano openssh-client perl \
                    python3 python3-pexpect python3-pip python3-jinja2 python3-git python3-subunit \
                    socat sudo texinfo tmux unzip vim \
                    wget xz-utils zstd rsync \
                    zlib1g-dev libssl-dev libncurses5-dev libncursesw5-dev \
                    && rm -rf /var/lib/apt/lists/*

                # --- Locale (some build scripts behave better with UTF-8) ---
                RUN locale-gen en_US.UTF-8 && update-locale LANG=en_US.UTF-8
                ENV LANG=en_US.UTF-8 \
                    LC_ALL=en_US.UTF-8
                
                RUN curl -fsSL https://code-server.dev/install.sh | sh

                COPY install-vscode-extensions.sh /usr/local/bin/install-vscode-extensions.sh
                RUN chmod +x /usr/local/bin/install-vscode-extensions.sh
                
                COPY extensions.txt /tmp/extensions.txt

                # --- Repo tool (very common in automotive Yocto manifests) ---
                RUN curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo \
                    -o /usr/local/bin/repo && chmod +x /usr/local/bin/repo

                # --- Optional: kas (popular for pinned, reproducible Yocto builds) ---
                RUN python3 -m pip install --no-cache-dir --upgrade pip && \
                    python3 -m pip install --no-cache-dir kas

                # --- Create non-root build user ---
                RUN groupadd --gid ${USER_GID} ${USERNAME} && \
                    useradd --uid ${USER_UID} --gid ${USER_GID} -m ${USERNAME} && \
                    echo "${USERNAME} ALL=(ALL) NOPASSWD:ALL" >/etc/sudoers.d/${USERNAME} && \
                    chmod 0440 /etc/sudoers.d/${USERNAME}

                USER ${USERNAME}
                WORKDIR /work

                # Pre-create common directories for cache mounts
                RUN mkdir -p /work/src /work/build /work/cache/downloads /work/cache/sstate

                # These are just defaults; you typically override in conf/local.conf
                ENV DL_DIR=/work/cache/downloads \
                    SSTATE_DIR=/work/cache/sstate

                # Handy: keep the container interactive by default
                CMD ["/bin/bash"]
    
    - title: Repository Details
      required:
        - repoUrl
        - repoName
        - repoOrg
        - gitUser
        - gitUserEmail
        - gitToken
      properties:
        repoUrl:
          title: Git Repository URL
          type: string
          ui:autofocus: true
          ui:options:
            rows: 5
        repoName:
          title: Git Repository Name
          type: string
          ui:autofocus: true
          ui:options:
            rows: 5
        repoOrg:
          title: GitRepository Organization
          type: string
          ui:autofocus: true
          ui:options:
            rows: 5
        gitUser:
          title: Git Username
          type: string
          description: Provide username for git operations
          ui:autofocus: true
          ui:options:
            rows: 5
        gitUserEmail:
          title: Git User Email
          type: string
          description: Provide email associated with the git username
          ui:autofocus: true
          ui:options:
            rows: 5
        gitToken:
          title: Git Token
          type: string
          description: Provide token for git operations
          ui:autofocus: true
          ui:options:
            rows: 5
    
    - title: Select Required IDE Extensions
      required:
        - extensions
      properties:
        extensions:
          title: IDE Extensions
          type: array
          description: Select the required IDE extensions
          items:
            type: string
            enum:
              - ms-python.python
              - ms-vscode.cpptools
              - ms-vscode.cmake-tools
              - yocto-project.yocto-bitbake
              - ms-vscode.remote-ssh
            uniqueItems: true
            ui:widget: checkboxes

    - title: Add users to group
      required:
        - username
        - groupname
      properties:
        username:
          title: Username
          type: string
          description: Provide username to add to group
          ui:autofocus: true
          ui:options:
            rows: 5
        groupname:
          title: Group Name
          type: string
          description: Provide group name to which user will be added
          enum:
            - Wipro-Group-A
            - Wipro-Group-B


  # These steps are executed in the scaffolder backend, using data that we gathered
  # via the parameters above.
  steps:
    # Each step executes an action, in this case one templates files into the working directory.
    #- id: fetch-base
    #  name: Fetch Base
    #  action: fetch:template
    #  input:
    #    url: https://github.com/Wipro-Organization-105/WeCollab/blob/main/bs-software-templates/workspace-create/python-template
    #    values:
          # name: ${{ parameters.name }}
          # image: ${{ parameters.image }}

    - id: fetch-templates
      name: Fetch Workspace Template
      action: fetch:template
      input:
        url: https://github.com/Wipro-Organization-105/WeCollab/tree/main/Terraform-Template/python-workspace-template
        values:        
           imageName: "${{ parameters.imageRegistry }}/${{ parameters.imageRepo }}/${{ parameters.imageName }}:${{ parameters.imageTag }}"
           dockerfile: "${{ parameters.dockerfile }}"
           groupname: "${{ parameters.groupname }}"
           gitUser: "${{ parameters.gitUser }}"
           gitUserEmail: "${{ parameters.gitUserEmail }}"
           gitToken: "${{ parameters.gitToken }}"
           extensions: "${{ parameters.extensions }}"
    # This step publishes the contents of the working directory to GitHub.
    # If you or your organization prefer another default branch name over 'main'
    # you can change that here.
    - id: publish
      name: Creating project repo
      action: publish:github
      input:
        description: Publishing generated project from workspace template
        repoUrl: "${{parameters.repoUrl}}?repo=${{ parameters.repoName }}&owner=${{ parameters.repoOrg }}"
        defaultBranch: 'main'
    
    # Trigger the image build workflow after publishing the repo
    - id: trigger-workflow
      name: Trigger GitHub Actions workflow
      action: github:actions:dispatch
      input:
        repoUrl: "${{parameters.repoUrl}}?repo=${{ parameters.repoName }}&owner=${{ parameters.repoOrg }}" 
        workflowId: image-build.yaml
        branchOrTagName: main
        workflowInputs:
          imageName: "${{ parameters.imageRegistry }}/${{ parameters.imageRepo }}/${{ parameters.imageName }}:${{ parameters.imageTag }}"
          repoUser: "${{ parameters.repoUser }}"
          repoPass: "${{ parameters.repoPass }}"
      
    # Trigger the workflow to update wecollab repo to make Terraform template available to users after workspace creation
    - id: trigger-workflow
      name: Trigger GitHub Actions workflow
      action: github:actions:dispatch
      input:
        repoUrl: "github.com?repo=${{ parameters.repoName }}&owner=${{ parameters.repoOrg }}" 
        workflowId: update-wecollab.yaml
        branchOrTagName: main
        workflowInputs:
          workspaceTemplateName: ${{ parameters.templateName }}


    # The final step is to register our new component in the catalog.
  #  - id: register
  #    name: Register
  #    action: catalog:register
  #    input:
  #      repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
  #      catalogInfoPath: '/catalog-info.yaml'

    # Let's notify the user that the template has completed using the Notification action
    - id: notify
      name: Notify
      action: notification:send
      input:
        recipients: entity
        entityRefs:
          - user:default/guest
        title: 'Template executed'
        info: 'Your template has been executed'
        severity: 'normal'

  # Outputs are displayed to the user after a successful execution of the template.
  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      # - title: Open in catalog
      #   icon: catalog
      #   entityRef: ${{ steps['register'].output.entityRef }}
